<!DOCTYPE html>
<html lang="en">
<head>
<meta name="theme-color" content="#181818" />
<link href="https://fonts.googleapis.com/css?family=Bree+Serif" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=PT+Sans" rel="stylesheet">
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Logo Designs</title>
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
<style type="text/css">

h2{
  color: #ecf0f1;
  text-shadow: 0px 3px 5px #000000;
}
h4{
  color: white;
  font-family: 'PT Sans', sans-serif;
}

#back{
  -webkit-background-size: cover;
  -moz-background-size: cover;
  -o-background-size: cover;
  background-size: cover;
  height: 100%;
  background-repeat:no-repeat;
  background: black; /* For browsers that do not support gradients */
}
#grad1 {
    -webkit-background-size: cover;
    -moz-background-size: cover;
    -o-background-size: cover;
    background-size: cover;
    height: 100%;
    background-repeat:no-repeat;
    background: red; /* For browsers that do not support gradients */
    background: -webkit-linear-gradient(left top, #fd746c, #ff9068); /* For Safari 5.1 to 6.0 */
    background: -o-linear-gradient(bottom right, #fd746c, #ff9068); /* For Opera 11.1 to 12.0 */
    background: -moz-linear-gradient(bottom right, #fd746c, #ff9068); /* For Firefox 3.6 to 15 */
    background: linear-gradient(to bottom right, #fd746c, #ff9068); /* Standard syntax (must be last) */
}

#grad2{
  color: white;
  background: repeating-linear-gradient(
    45deg,
    #1abc9c,
    #1abc9c 10px,
    #16a085 10px,
    #16a085 20px
  );
}

    .box{
        width: auto;
        display: block;
        margin-right: auto;
        margin-left: auto;
        margin-bottom: 40px;
        border-radius: 0px;
        padding: 7px;
        background: #ffffff;
        box-shadow: 0px 3px 2px #304352;


    }
	.bs-example{
    	margin: 16px;
      text-align: center;
      font-family: 'Bree Serif', serif;

    }
</style>
</head>
<body id="back">

<div class="bs-example">
    <h4>Anjani Lifecure Sciences</h4>
    <div class="box" style="padding:0px">
        <img src="anjani.jpg" class="img-responsive" >
    </div>
    <h4>Logo Portfolio</h4>
    <div class="box" style="padding:0px">
        <img src="poster.jpg" class="img-responsive" >
    </div>



</div>
</body>
</html>
